<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - True Stylez</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1f2e 0%, #0f1419 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #d94600;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
    }

    .message {
      font-size: 1.25rem;
      margin-bottom: 3rem;
      color: #e5e7eb;
    }

    .clipper-animation {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 3rem;
    }

    .clipper {
      position: absolute;
      width: 80px;
      height: 60px;
      background: linear-gradient(145deg, #2a2f3e, #1a1f2e);
      border-radius: 8px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 2px solid #d94600;
    }

    .blade {
      position: absolute;
      width: 70px;
      height: 8px;
      background: linear-gradient(90deg, #94a3b8, #cbd5e1);
      top: 15px;
      left: 5px;
      border-radius: 4px;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .blade::before {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: #64748b;
      border-radius: 50%;
      right: -5px;
      top: -1px;
    }

    .sharpening-stroke {
      position: absolute;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, transparent, #d94600, #fbbf24, #d94600, transparent);
      top: 50%;
      animation: sharpen 1.5s ease-in-out infinite;
      opacity: 0.8;
    }

    @keyframes sharpen {
      0% {
        transform: translateY(-20px) scaleX(0);
        opacity: 0;
      }
      20% {
        transform: translateY(-20px) scaleX(0.5);
        opacity: 0.8;
      }
      50% {
        transform: translateY(0) scaleX(1);
        opacity: 1;
      }
      80% {
        transform: translateY(20px) scaleX(0.5);
        opacity: 0.8;
      }
      100% {
        transform: translateY(20px) scaleX(0);
        opacity: 0;
      }
    }

    .sparkles {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fbbf24;
      border-radius: 50%;
      box-shadow: 0 0 6px #fbbf24;
      animation: sparkle 2s infinite;
    }

    @keyframes sparkle {
      0%, 100% {
        transform: scale(0) translateY(0);
        opacity: 0;
      }
      50% {
        transform: scale(1) translateY(-30px);
        opacity: 1;
      }
    }

    .sparkle:nth-child(1) { top: 10px; left: 20px; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 30px; right: 15px; animation-delay: 0.3s; }
    .sparkle:nth-child(3) { bottom: 20px; left: 25px; animation-delay: 0.6s; }
    .sparkle:nth-child(4) { bottom: 30px; right: 20px; animation-delay: 0.9s; }

    .retry-button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #d94600, #f97316);
      color: white;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .retry-button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(217, 70, 0, 0.4);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>True Stylez</h1>
    <p class="message">You're offline, but we're still sharp!</p>
    
    <div class="clipper-animation">
      <div class="sparkles">
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
      </div>
      <div class="clipper">
        <div class="blade"></div>
        <div class="sharpening-stroke"></div>
      </div>
    </div>
    
    <button class="retry-button" onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
