[build]
  command = "npm run build"
  publish = ".next"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://plausible.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://plausible.io; frame-ancestors 'none';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Redirects
[[redirects]]
  from = "https://www.truestylez.com/*"
  to = "https://truestylez.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.truestylez.com/*"
  to = "http://truestylez.com/:splat"
  status = 301
  force = true
